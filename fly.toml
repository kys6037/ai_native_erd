app = "ai-native-erd"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/erd.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "erd_data"
  destination = "/data"
